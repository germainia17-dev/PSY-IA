
[functions.stripe-webhook]
enabled = true
# Stripe ne fournit pas de JWT : il s'authentifie via sa signature HMAC,
# vérifiée dans la fonction. Le JWT doit donc être désactivé ici.
verify_jwt = false
entrypoint = "./functions/stripe-webhook/index.ts"

[functions.stripe-portal]
enabled = true
verify_jwt = true
entrypoint = "./functions/stripe-portal/index.ts"

[functions.chat]
enabled = true
verify_jwt = false
import_map = "./functions/chat/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/chat/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/chat/*.html" ]
